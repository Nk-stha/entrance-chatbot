# Nginx reverse proxy template for the chatbot backend.
# Copy to: /etc/nginx/sites-available/entrance-chatbot
# Replace chatbot.entrancegateway.com with the real chatbot domain.

server {
    listen 80;
    listen [::]:80;
    server_name chatbot.entrancegateway.com;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for streaming responses from /api/v1/chat/stream.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /api/v1/health {
        proxy_pass http://127.0.0.1:8002/api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
