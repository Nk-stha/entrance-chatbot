name: Deploy Chatbot to VPS

on:
  workflow_run:
    workflows:
      - Build and Publish Backend Image
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: production-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production stack
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
          GHCR_DEFAULT_USERNAME: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: GHCR_USERNAME,GHCR_TOKEN,GHCR_DEFAULT_USERNAME
          script_stop: true
          script: |
            set -Eeuo pipefail

            APP_DIR="${APP_DIR:-/opt/entrance-chatbot}"
            REPO_URL="${REPO_URL:-https://github.com/${{ github.repository }}.git}"
            BRANCH="${BRANCH:-main}"
            GHCR_USERNAME="${GHCR_USERNAME:-$GHCR_DEFAULT_USERNAME}"

            if [ -n "${GHCR_TOKEN:-}" ]; then
              if ! echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin; then
                echo "Failed to log in to ghcr.io as $GHCR_USERNAME. Check GHCR_TOKEN read:packages access and package visibility." >&2
                exit 1
              fi
            else
              echo "GHCR_TOKEN is not set; continuing without ghcr.io login"
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            chmod +x scripts/deploy-vps.sh scripts/backup-vps.sh
            APP_DIR="$APP_DIR" scripts/deploy-vps.sh
